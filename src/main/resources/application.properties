# ==========================================
# AUTH SERVICE
# ==========================================
server.port=8081
spring.application.name=auth-service

# Config server (optional)
spring.config.import=optional:configserver:http://localhost:8888

# ---- Database ----
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ---- Connection Pool ----
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ---- Eureka ----
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.instance.prefer-ip-address=true

# ---- CORS (allowed frontend origin) ----
app.cors.allowed-origin=http://localhost:4200

# ---- JWT (placeholder - replace with real secret) ----
app.jwt.secret=library-secret-key-change-in-production
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=86400000

# ---- Actuator ----
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
